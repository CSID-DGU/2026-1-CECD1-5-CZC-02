spring.application.name=backend

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/salesmap?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
# TODO: Replace with your local MySQL root password before running the backend.
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
# TODO: Set JWT_SECRET as a strong externalized secret before production.
jwt.secret=${JWT_SECRET:dev-salesmap-jwt-secret-key-change-me-please-keep-it-long}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# AI Module
ai.module.mode=${AI_MODULE_MODE:mock}
ai.module.base-url=${AI_MODULE_BASE_URL:http://localhost:8000}
ai.module.connect-timeout-ms=${AI_MODULE_CONNECT_TIMEOUT_MS:3000}
ai.module.read-timeout-ms=${AI_MODULE_READ_TIMEOUT_MS:10000}

# Salesmap API
salesmap.api.mode=${SALESMAP_API_MODE:mock}
salesmap.api.base-url=${SALESMAP_API_BASE_URL:http://localhost:9000}
salesmap.api.register-path=${SALESMAP_API_REGISTER_PATH:/records}
salesmap.api.connect-timeout-ms=${SALESMAP_API_CONNECT_TIMEOUT_MS:3000}
salesmap.api.read-timeout-ms=${SALESMAP_API_READ_TIMEOUT_MS:10000}
