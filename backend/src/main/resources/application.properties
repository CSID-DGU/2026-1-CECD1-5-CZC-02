spring.application.name=backend

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/salesmap?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
# TODO: Set JWT_SECRET as a strong externalized secret before production.
jwt.secret=${JWT_SECRET:dev-salesmap-jwt-secret-key-change-me-please-keep-it-long}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# AI Module
ai.module.mode=${AI_MODULE_MODE:mock}
ai.module.base-url=${AI_MODULE_BASE_URL:http://localhost:8000}
ai.module.connect-timeout-ms=${AI_MODULE_CONNECT_TIMEOUT_MS:3000}
ai.module.read-timeout-ms=${AI_MODULE_READ_TIMEOUT_MS:60000}

# Salesmap API
salesmap.api.mode=${SALESMAP_API_MODE:mock}
salesmap.api.base-url=${SALESMAP_API_BASE_URL:http://localhost:9000}
salesmap.api.register-path=${SALESMAP_API_REGISTER_PATH:/records}
salesmap.api.connect-timeout-ms=${SALESMAP_API_CONNECT_TIMEOUT_MS:3000}
salesmap.api.read-timeout-ms=${SALESMAP_API_READ_TIMEOUT_MS:10000}

# Gmail OAuth
gmail.oauth.client-id=${GMAIL_CLIENT_ID:}
gmail.oauth.client-secret=${GMAIL_CLIENT_SECRET:}
gmail.oauth.redirect-uri=${GMAIL_REDIRECT_URI:http://localhost:5173/settings/gmail/callback}
gmail.oauth.scope=${GMAIL_OAUTH_SCOPE:openid email profile https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/calendar.events}
gmail.oauth.collect-page-size=${GMAIL_COLLECT_PAGE_SIZE:500}

# Google Calendar API
google.calendar.enabled=${GOOGLE_CALENDAR_ENABLED:true}
google.calendar.base-url=${GOOGLE_CALENDAR_BASE_URL:https://www.googleapis.com/calendar/v3}
google.calendar.calendar-id=${GOOGLE_CALENDAR_ID:primary}
google.calendar.time-zone=${GOOGLE_CALENDAR_TIME_ZONE:Asia/Seoul}
google.calendar.connect-timeout-ms=${GOOGLE_CALENDAR_CONNECT_TIMEOUT_MS:3000}
google.calendar.read-timeout-ms=${GOOGLE_CALENDAR_READ_TIMEOUT_MS:10000}
